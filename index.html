<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;font-size:15px;}
input,select,textarea,button{font-family:inherit;font-size:14px;}
input,select,textarea{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;background:#fff;color:#1e293b;outline:none;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{border-color:#6366f1;}
button{cursor:pointer;border:none;border-radius:10px;font-weight:600;transition:all .15s;}
.header{background:#1e1b4b;color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.header h1{font-size:17px;font-weight:700;line-height:1.2;}
.header p{font-size:11px;opacity:.7;margin-top:2px;}
.btn-add{background:#6366f1;color:#fff;padding:9px 16px;border-radius:10px;font-size:13px;white-space:nowrap;}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:16px;}
@media(max-width:700px){.stats{grid-template-columns:repeat(3,1fr);}}
@media(max-width:400px){.stats{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.stat-card .lbl{font-size:11px;color:#64748b;}
.stat-card .val{font-size:20px;font-weight:700;margin-top:2px;}
.filters{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 12px;}
.filters input,.filters select{width:auto;flex:1;min-width:130px;font-size:13px;padding:8px 12px;}
.results-count{font-size:12px;color:#94a3b8;padding:0 16px 8px;}
.table-wrap{padding:0 16px 80px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);min-width:900px;}
.tbl thead{background:#f8fafc;}
.tbl th{text-align:left;font-size:11px;font-weight:700;color:#64748b;padding:10px 12px;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #e2e8f0;}
.tbl td{padding:10px 12px;border-bottom:1px solid #f1f5f9;vertical-align:top;font-size:13px;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tbody tr{cursor:pointer;transition:background .12s;}
.tbl tbody tr:hover{background:#f0f0ff;}
.addr-main{font-weight:600;color:#1e293b;white-space:nowrap;}
.addr-sub{font-size:11px;color:#94a3b8;margin-top:1px;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.stage-Prospect{background:#f1f5f9;color:#475569;}
.stage-Under-Review{background:#dbeafe;color:#1d4ed8;}
.stage-Due-Diligence{background:#fef9c3;color:#854d0e;}
.stage-Offer-Made{background:#ffedd5;color:#c2410c;}
.stage-Under-Contract{background:#f3e8ff;color:#7e22ce;}
.stage-Acquired{background:#dcfce7;color:#15803d;}
.stage-Passed{background:#fee2e2;color:#b91c1c;}
.type-cash{background:#dcfce7;color:#15803d;}
.type-mortgage{background:#dbeafe;color:#1d4ed8;}
.type-brrrr{background:#d1fae5;color:#065f46;}
.green{color:#15803d;font-weight:600;}
.red{color:#b91c1c;font-weight:600;}
.yellow{color:#b45309;font-weight:600;}
.indigo{color:#4338ca;font-weight:600;}
.orange{color:#c2410c;}
.row-actions{display:flex;gap:6px;}
.icon-btn{padding:6px 8px;border-radius:8px;font-size:14px;border:none;}
.icon-btn.pdf{background:#f1f5f9;color:#475569;}
.icon-btn.email{background:#eef2ff;color:#4338ca;}
.empty{text-align:center;padding:60px 20px;color:#94a3b8;font-size:14px;}
.card-list{display:none;padding:0 12px 80px;}
@media(max-width:1023px){.table-wrap{display:none;}.card-list{display:block;}}
.prop-card{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s;}
.prop-card:hover{background:#f0f0ff;}
.prop-card-left{flex:0 0 auto;min-width:180px;max-width:220px;}
.prop-card-title{font-weight:700;font-size:14px;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prop-card-sub{font-size:11px;color:#94a3b8;margin-top:1px;}
.prop-card-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.prop-card-metrics{flex:1;display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
@media(max-width:700px){.prop-card-metrics{grid-template-columns:repeat(3,1fr);}}
@media(max-width:480px){.prop-card-metrics{grid-template-columns:repeat(2,1fr);}}
.prop-card-stat{background:#f8fafc;border-radius:8px;padding:6px 8px;}
.prop-card-stat .sl{font-size:10px;color:#64748b;white-space:nowrap;}
.prop-card-stat .sv{font-size:12px;font-weight:600;color:#1e293b;margin-top:1px;white-space:nowrap;}
.prop-card-actions{flex:0 0 auto;display:flex;flex-direction:column;gap:6px;}
.prop-card-actions button{padding:7px 10px;font-size:12px;border-radius:8px;white-space:nowrap;}
.btn-view{background:#6366f1;color:#fff;}
.btn-pdf2{background:#1e1b4b;color:#fff;}
.btn-email2{background:#eef2ff;color:#4338ca;border:1px solid #c7d2fe;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:12px;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:18px;width:100%;max-width:760px;max-height:95vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.2);}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid #e2e8f0;flex-shrink:0;}
.modal-header h2{font-size:17px;font-weight:700;}
.modal-close{background:none;border:none;font-size:24px;color:#94a3b8;line-height:1;padding:0;}
.modal-tabs{display:flex;gap:6px;margin-top:12px;overflow-x:auto;padding-bottom:2px;}
.tab-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;border:none;white-space:nowrap;background:#f1f5f9;color:#475569;}
.tab-btn.active{background:#6366f1;color:#fff;}
.modal-body{overflow-y:auto;padding:18px 20px;flex:1;}
.modal-footer{padding:14px 20px;border-top:1px solid #e2e8f0;display:flex;gap:10px;flex-shrink:0;}
.modal-footer button{flex:1;padding:11px;font-size:14px;}
.btn-cancel{background:#f1f5f9;color:#475569;}
.btn-save{background:#6366f1;color:#fff;}
.btn-delete{background:#fee2e2;color:#b91c1c;flex:0 0 auto;padding:11px 16px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.form-grid{grid-template-columns:1fr;}}
.form-section{margin-bottom:18px;}
.section-title{font-size:11px;font-weight:700;color:#6366f1;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #e0e7ff;padding-bottom:6px;margin-bottom:10px;}
.field{margin-bottom:10px;}
.field label{display:block;font-size:12px;color:#64748b;margin-bottom:4px;font-weight:500;}
.field textarea{height:80px;resize:vertical;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.deal-type-toggle{display:flex;gap:8px;flex-wrap:wrap;}
.deal-type-toggle button{flex:1;padding:10px;font-size:13px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;color:#475569;min-width:80px;}
.deal-type-toggle button.active{border-color:#6366f1;background:#6366f1;color:#fff;}
.deal-type-toggle button.active-brrrr{border-color:#15803d;background:#15803d;color:#fff;}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.calc-box{background:#f8fafc;border-radius:10px;padding:10px 12px;}
.calc-box.hi{background:#eef2ff;border:1px solid #c7d2fe;}
.calc-box.warn{background:#fff7ed;border:1px solid #fed7aa;}
.calc-box .cl{font-size:11px;color:#64748b;}
.calc-box .cv{font-size:14px;font-weight:700;color:#1e293b;margin-top:2px;}
.calc-box.hi .cv{color:#4338ca;}
.calc-box.warn .cv{color:#c2410c;}
.closing-summary{background:#eef2ff;border:1px solid #c7d2fe;border-radius:12px;padding:14px;margin-top:10px;}
.closing-group{margin-bottom:10px;}
.closing-group-title{font-size:11px;font-weight:700;color:#6366f1;margin-bottom:4px;}
.closing-row{display:flex;justify-content:space-between;font-size:12px;color:#475569;padding:2px 0;}
.closing-total{display:flex;justify-content:space-between;font-weight:700;font-size:14px;border-top:1px solid #a5b4fc;padding-top:8px;margin-top:6px;color:#312e81;}
.detail-section{margin-bottom:16px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.detail-cell{background:#f8fafc;border-radius:10px;padding:10px 12px;}
.detail-cell .dl{font-size:11px;color:#64748b;}
.detail-cell .dv{font-size:13px;font-weight:600;color:#1e293b;margin-top:2px;}
.detail-actions{display:flex;gap:8px;margin:12px 0;}
.detail-actions button{flex:1;padding:10px;font-size:13px;border-radius:10px;}
.btn-pdf3{background:#1e1b4b;color:#fff;}
.btn-email3{background:#6366f1;color:#fff;}
.notes-box{background:#fefce8;border:1px solid #fde68a;border-radius:10px;padding:12px;font-size:13px;color:#374151;}
.email-preview{background:#f8fafc;border-radius:10px;padding:12px;max-height:180px;overflow-y:auto;font-size:11px;font-family:monospace;color:#374151;white-space:pre-wrap;line-height:1.5;}
.email-status{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:10px;}
.email-status.ok{background:#dcfce7;color:#15803d;}
.email-status.copied{background:#dbeafe;color:#1d4ed8;}
.pac-container{z-index:9999!important;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);border:1px solid #e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
.pac-item{padding:8px 12px;font-size:13px;cursor:pointer;}
.pac-item:hover{background:#f0f0ff;}
.pac-item-query{font-weight:600;color:#1e293b;}
.pac-icon{display:none;};transform:translateX(-50%);background:#1e1b4b;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.brrrr-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:14px;margin-top:4px;}
.brrrr-box .section-title{color:#15803d;border-color:#86efac;}
.brrrr-result{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:#166534;}
.brrrr-result strong{font-weight:700;}
.brrrr-total{display:flex;justify-content:space-between;font-weight:700;font-size:14px;border-top:1.5px solid #86efac;padding-top:8px;margin-top:6px;color:#14532d;}
.brrrr-verdict{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:600;text-align:center;}
.brrrr-verdict.good{background:#dcfce7;color:#15803d;}
.brrrr-verdict.warn{background:#fef9c3;color:#854d0e;}
.brrrr-verdict.bad{background:#fee2e2;color:#b91c1c;}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🏠 NYEG Acquisition Database</h1>
    <p id="hdr-sub">NY English Group</p>
  </div>
  <button class="btn-add" onclick="openAdd()">+ Add Property</button>
</div>

<div class="stats" id="stats-row"></div>
<div class="filters">
  <input type="text" id="search" placeholder="Search address / city…" oninput="renderAll()">
  <select id="fStage" onchange="renderAll()">
    <option value="">All Stages</option>
    <option>Prospect</option><option>Under Review</option><option>Due Diligence</option>
    <option>Offer Made</option><option>Under Contract</option><option>Acquired</option><option>Passed</option>
  </select>
  <select id="fDeal" onchange="renderAll()">
    <option value="">All Deal Types</option>
    <option value="mortgage">Mortgage</option>
    <option value="cash">Cash</option>
    <option value="brrrr">BRRRR</option>
  </select>
  <select id="fSort" onchange="renderAll()">
    <option value="date">Sort: Date Added</option>
    <option value="asking">Sort: Asking Price ↓</option>
    <option value="arv">Sort: ARV ↓</option>
    <option value="equity">Sort: Equity ↓</option>
  </select>
</div>
<div class="results-count" id="results-count"></div>

<div class="table-wrap">
  <table class="tbl">
    <thead><tr>
      <th>Address</th><th>Type</th><th>Stage</th><th>Asking</th><th>Offered</th>
      <th>ARV</th><th>Rehab</th><th>Down/Cash</th><th>Closing</th>
      <th>Total Cash</th><th>Carry/mo</th><th>Cash Flow</th>
      <th>Cap Rate</th><th>CoC</th><th>Equity</th><th></th>
    </tr></thead>
    <tbody id="tbl-body"></tbody>
  </table>
</div>
<div class="card-list" id="card-list"></div>

<!-- Add/Edit Modal -->
<div class="overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-header">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2 id="modal-title">Add Property</h2>
        <button class="modal-close" onclick="closeModal('modal-edit')">×</button>
      </div>
      <div class="modal-tabs">
        <button class="tab-btn active" onclick="switchTab('details')">Property &amp; Pricing</button>
        <button class="tab-btn" onclick="switchTab('closing')">Closing Costs</button>
        <button class="tab-btn" onclick="switchTab('financials')">Financials &amp; Returns</button>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-edit')">Cancel</button>
      <button class="btn-save" onclick="saveProperty()">Save Property</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="modal-detail">
  <div class="modal" style="max-width:580px;">
    <div class="modal-header">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2 id="detail-title">Property Detail</h2>
        <button class="modal-close" onclick="closeModal('modal-detail')">×</button>
      </div>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn-delete" onclick="deleteProperty()">Delete</button>
      <button class="btn-cancel" onclick="editFromDetail()">Edit</button>
      <button class="btn-save" onclick="closeModal('modal-detail')">Close</button>
    </div>
  </div>
</div>

<!-- Email Modal -->
<div class="overlay" id="modal-email">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2>📧 Email Report</h2>
        <button class="modal-close" onclick="closeModal('modal-email')">×</button>
      </div>
    </div>
    <div class="modal-body" id="email-body"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="copyEmailText()">📋 Copy Text</button>
      <button class="btn-save" onclick="openMailClient()">📧 Open in Mail App</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = 'nyeg_props_v2';
var properties = [];
var currentForm = {};
var currentTab = 'details';
var editingId = null;
var detailId = null;
var emailPropId = null;
var emailBody = '';
var emailSubject = '';

var SAMPLE = [
  {id:1,address:"412 Elm Street",city:"Memphis",state:"TN",zip:"38103",stage:"Due Diligence",leadSource:"Wholesaler",sqft:1450,beds:3,baths:2,yearBuilt:1987,askingPrice:145000,amountOffered:128000,purchasePrice:132000,arv:210000,dealType:"mortgage",downPct:"20",mortgageRate:"7.5",mortgageTerm:"30",interestOnlyRate:"7.5",rehabCostPerSqft:22,rehabTotal:"",taxes:2400,insurance:1800,hoaFees:0,otherMonthly:50,grossRent:1650,noi:"",roi:11.2,brrrrRefiLTV:"",brrrrHoldMonths:"",brrrrHoldCostPerMonth:"",notes:"Needs full kitchen and bath update.",dateAdded:"2026-02-20",closing:{originationFee:1320,discountPoints:0,appraisalFee:500,creditReport:50,floodDetermination:20,taxServiceFee:85,underwritingFee:995,titleSearch:200,titleInsuranceLender:600,titleInsuranceOwner:850,escrowFee:500,settlementFee:350,recordingFee:125,wireTransferFee:30,transferTax:660,mansionTax:0,prepaidInterest:0,prepaidInsurance:0,prepaidTaxes:0,escrowReserves:0,homeInspection:400,pestInspection:150,radonTest:0,sewerscopeInspection:0,surveyFee:0,attorneyFee:0,HOATransferFee:0,otherClosingCost:0}},
  {id:2,address:"87 Rosewood Dr",city:"Little Rock",state:"AR",zip:"72201",stage:"Offer Made",leadSource:"Direct Mail",sqft:1800,beds:4,baths:2,yearBuilt:1995,askingPrice:175000,amountOffered:155000,purchasePrice:155000,arv:240000,dealType:"cash",downPct:"20",mortgageRate:"7.25",mortgageTerm:"30",interestOnlyRate:"7.25",rehabCostPerSqft:18,rehabTotal:"",taxes:2800,insurance:1600,hoaFees:0,otherMonthly:0,grossRent:1850,noi:"",roi:"",brrrrRefiLTV:"",brrrrHoldMonths:"",brrrrHoldCostPerMonth:"",notes:"Cosmetic only.",dateAdded:"2026-03-01",closing:{originationFee:0,discountPoints:0,appraisalFee:0,creditReport:0,floodDetermination:0,taxServiceFee:0,underwritingFee:0,titleSearch:200,titleInsuranceLender:0,titleInsuranceOwner:900,escrowFee:500,settlementFee:350,recordingFee:125,wireTransferFee:30,transferTax:775,mansionTax:0,prepaidInterest:0,prepaidInsurance:0,prepaidTaxes:0,escrowReserves:0,homeInspection:400,pestInspection:150,radonTest:0,sewerscopeInspection:250,surveyFee:0,attorneyFee:0,HOATransferFee:0,otherClosingCost:0}},
  {id:3,address:"309 Birchwood Ave",city:"Pittsburgh",state:"PA",zip:"15212",stage:"Under Review",leadSource:"Wholesaler",sqft:1600,beds:3,baths:1,yearBuilt:1952,askingPrice:95000,amountOffered:82000,purchasePrice:82000,arv:185000,dealType:"brrrr",downPct:"20",mortgageRate:"7.25",mortgageTerm:"30",interestOnlyRate:"7.25",rehabCostPerSqft:35,rehabTotal:"",taxes:3200,insurance:1400,hoaFees:0,otherMonthly:0,grossRent:1600,noi:"",roi:"",brrrrRefiLTV:"75",brrrrHoldMonths:"5",brrrrHoldCostPerMonth:"900",notes:"Heavy rehab, strong ARV in Manchester area.",dateAdded:"2026-03-15",closing:{originationFee:0,discountPoints:0,appraisalFee:500,creditReport:50,floodDetermination:20,taxServiceFee:0,underwritingFee:0,titleSearch:200,titleInsuranceLender:0,titleInsuranceOwner:750,escrowFee:500,settlementFee:350,recordingFee:125,wireTransferFee:30,transferTax:410,mansionTax:0,prepaidInterest:0,prepaidInsurance:0,prepaidTaxes:0,escrowReserves:0,homeInspection:400,pestInspection:150,radonTest:150,sewerscopeInspection:250,surveyFee:0,attorneyFee:0,HOATransferFee:0,otherClosingCost:0}}
];

function loadData() {
  try { var d = localStorage.getItem(STORAGE_KEY); properties = d ? JSON.parse(d) : SAMPLE; }
  catch(e) { properties = SAMPLE; }
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(properties)); } catch(e) {}
}
function nv(v) { return Number(v) || 0; }
function f$(v, dec) {
  dec = dec || 0;
  if (v === '' || v === null || v === undefined || isNaN(Number(v))) return '—';
  return '$' + Number(v).toLocaleString('en-US', {minimumFractionDigits:dec, maximumFractionDigits:dec});
}
function fPct(v) { return v ? Number(v).toFixed(2) + '%' : '—'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) { var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); }, 2200); }

// ── Closing Items ─────────────────────────────────────────────────────────────
function closingItems(c, dealType) {
  c = c || {};
  var mort = dealType !== 'cash';
  var it = [];
  if (mort) {
    it.push({g:'Lender Fees',l:'Origination Fee',v:nv(c.originationFee)});
    it.push({g:'Lender Fees',l:'Discount Points',v:nv(c.discountPoints)});
    it.push({g:'Lender Fees',l:'Appraisal Fee',v:nv(c.appraisalFee)});
    it.push({g:'Lender Fees',l:'Credit Report',v:nv(c.creditReport)});
    it.push({g:'Lender Fees',l:'Flood Determination',v:nv(c.floodDetermination)});
    it.push({g:'Lender Fees',l:'Tax Service Fee',v:nv(c.taxServiceFee)});
    it.push({g:'Lender Fees',l:'Underwriting Fee',v:nv(c.underwritingFee)});
  }

function closingTotal(c, dealType) {

}

// ── BRRRR Calculation ─────────────────────────────────────────────────────────
function brrrrCalc(p) {
  var purchase = nv(p.purchasePrice) || nv(p.amountOffered);
  var sqft = nv(p.sqft);
  var rehab = p.rehabTotal ? nv(p.rehabTotal) : sqft * nv(p.rehabCostPerSqft);
  var arv = nv(p.arv);
  var cTotal = closingTotal(p.closing, p.dealType);
  var holdMonths = nv(p.brrrrHoldMonths);
  var holdCostMo = nv(p.brrrrHoldCostPerMonth);
  var holdCost = holdMonths * holdCostMo;
  var totalInvested = purchase + rehab + cTotal + holdCost;
  var refiLTV = nv(p.brrrrRefiLTV) || 75;
  var refiLoan = arv * (refiLTV / 100);
  var cashOut = refiLoan - purchase - rehab - cTotal;
  var cashLeftIn = totalInvested - refiLoan;
  var r = nv(p.mortgageRate) / 100 / 12;
  var np = nv(p.mortgageTerm) * 12;
  var refiPmt = (refiLoan && r && np) ? refiLoan * (r * Math.pow(1+r,np)) / (Math.pow(1+r,np)-1) : 0;
  var taxMo = nv(p.taxes)/12;
  var insMo = nv(p.insurance)/12;
  var hoa = nv(p.hoaFees);
  var other = nv(p.otherMonthly);
  var carry = refiPmt + taxMo + insMo + hoa + other;
  var rent = nv(p.grossRent);
  var cashFlow = rent - carry;
  var noi = nv(p.noi) || (rent*12 - nv(p.taxes) - nv(p.insurance) - hoa*12 - other*12);
  var capRate = purchase ? (noi / purchase) * 100 : 0;
  var coc = cashLeftIn > 0 ? (cashFlow * 12 / cashLeftIn) * 100 : (cashLeftIn <= 0 ? 9999 : 0);
  var equity = arv - refiLoan;
  return {purchase:purchase, rehab:rehab, cTotal:cTotal, holdCost:holdCost, totalInvested:totalInvested, refiLoan:refiLoan, cashOut:cashOut, cashLeftIn:cashLeftIn, refiPmt:refiPmt, carry:carry, cashFlow:cashFlow, noi:noi, capRate:capRate, coc:coc, equity:equity, arv:arv, refiLTV:refiLTV};
}

function brrrrPanelHTML(f) {
  var arv = nv(f.arv);
  if (!arv) {
    return '<div class="brrrr-box"><div class="section-title">♻️ BRRRR Analysis</div><div style="font-size:12px;color:#64748b;padding:6px 0;">Enter ARV and purchase details to see BRRRR projections.</div></div>';
  }
  var b = brrrrCalc(f);
  var infinite = b.cashLeftIn <= 0;
  var verdictCls = infinite || b.cashLeftIn < b.totalInvested * 0.1 ? 'good' : b.cashLeftIn < b.totalInvested * 0.25 ? 'warn' : 'bad';
  var verdictMsg = infinite
    ? '🚀 Full capital recovery — infinite returns!'
    : b.cashLeftIn < b.totalInvested * 0.1
      ? '✅ Near full pull — only ' + f$(b.cashLeftIn) + ' left in deal'
      : b.cashLeftIn < b.totalInvested * 0.25
        ? '⚠️ Partial pull — ' + f$(b.cashLeftIn) + ' left in deal'
        : '❌ ' + f$(b.cashLeftIn) + ' left in — consider higher ARV or LTV';
  return '<div class="brrrr-box">'
    + '<div class="section-title">♻️ BRRRR Analysis</div>'
    + '<div class="brrrr-result"><span>Total Invested (all-in)</span><strong>' + f$(b.totalInvested) + '</strong></div>'
    + '<div class="brrrr-result"><span>Refi Loan (' + b.refiLTV + '% LTV × ARV)</span><strong>' + f$(b.refiLoan) + '</strong></div>'
    + '<div class="brrrr-result"><span>Cash-Out from Refi</span><strong>' + f$(b.cashOut) + '</strong></div>'
    + '<div class="brrrr-result"><span>Hold Cost (' + nv(f.brrrrHoldMonths) + ' mo × ' + f$(nv(f.brrrrHoldCostPerMonth)) + ')</span><strong>' + f$(b.holdCost) + '</strong></div>'
    + '<div class="brrrr-result"><span>Refi P&amp;I (' + f.mortgageRate + '%/' + f.mortgageTerm + 'yr)</span><strong>' + f$(b.refiPmt,2) + '/mo</strong></div>'
    + '<div class="brrrr-result"><span>Monthly Carry (post-refi)</span><strong>' + f$(b.carry,2) + '/mo</strong></div>'
    + '<div class="brrrr-result"><span>Cash Flow (post-refi)</span><strong>' + f$(b.cashFlow,2) + '/mo</strong></div>'
    + '<div class="brrrr-result"><span>Equity Retained</span><strong>' + f$(b.equity) + '</strong></div>'
    + '<div class="brrrr-result"><span>Cap Rate</span><strong>' + fPct(b.capRate) + '</strong></div>'
    + '<div class="brrrr-result"><span>CoC (on cash left in)</span><strong>' + (infinite ? '∞ %' : fPct(b.coc)) + '</strong></div>'
    + '<div class="brrrr-total"><span>Cash Left In Deal</span><span>' + (infinite ? '$0 or less ✅' : f$(b.cashLeftIn)) + '</span></div>'
    + '<div class="brrrr-verdict ' + verdictCls + '">' + verdictMsg + '</div>'
    + '</div>';
}

// ── Derive ────────────────────────────────────────────────────────────────────
function derive(p) {
  if (p.dealType === 'brrrr') {
    var b = brrrrCalc(p);
    return {rehab:b.rehab, down:b.purchase, loan:b.refiLoan, cTotal:b.cTotal, totalIn:b.totalInvested, fixedPmt:b.refiPmt, ioPmt:0, carryFixed:b.carry, carryIO:b.carry, carryCash:b.carry, equity:b.equity, noi:b.noi, capRate:b.capRate, cashFlow:b.cashFlow, coc:b.coc, purchase:b.purchase, isCash:false, isBrrrr:true, bData:b};
  }
  var sqft = nv(p.sqft), arv = nv(p.arv);
  var purchase = nv(p.purchasePrice) || nv(p.amountOffered);
  var rehab = p.rehabTotal ? nv(p.rehabTotal) : sqft * nv(p.rehabCostPerSqft);
  var isCash = p.dealType === 'cash';
  var downFrac = isCash ? 1 : nv(p.downPct)/100;
  var down = purchase * downFrac;
  var loan = isCash ? 0 : purchase - down;
  var cTotal = closingTotal(p.closing, p.dealType);
  var totalIn = down + cTotal + rehab;
  var r = nv(p.mortgageRate)/100/12;
  var np = nv(p.mortgageTerm)*12;
  var fixedPmt = (!isCash && loan && r && np) ? loan*(r*Math.pow(1+r,np))/(Math.pow(1+r,np)-1) : 0;
  var ioPmt = (!isCash && loan) ? loan*(nv(p.interestOnlyRate)/100/12) : 0;
  var taxMo = nv(p.taxes)/12, insMo = nv(p.insurance)/12;
  var hoa = nv(p.hoaFees), other = nv(p.otherMonthly);
  var carryFixed = fixedPmt + taxMo + insMo + hoa + other;
  var carryIO = ioPmt + taxMo + insMo + hoa + other;
  var carryCash = taxMo + insMo + hoa + other;
  var equity = arv - purchase - rehab;
  var rent = nv(p.grossRent);
  var noi = nv(p.noi) || (rent*12 - nv(p.taxes) - nv(p.insurance) - hoa*12 - other*12);
  var capRate = purchase ? (noi/purchase)*100 : 0;
  var effectCarry = isCash ? carryCash : carryFixed;
  var cashFlow = rent - effectCarry;
  var coc = totalIn ? (cashFlow*12/totalIn)*100 : 0;
  return {rehab:rehab, down:down, loan:loan, cTotal:cTotal, totalIn:totalIn, fixedPmt:fixedPmt, ioPmt:ioPmt, carryFixed:carryFixed, carryIO:carryIO, carryCash:carryCash, equity:equity, noi:noi, capRate:capRate, cashFlow:cashFlow, coc:coc, purchase:purchase, isCash:isCash, isBrrrr:false, bData:null};
}

function calcBoxesHTML(d, f) {
  var isBrrrr = f.dealType === 'brrrr';
  var isCash = f.dealType === 'cash';
  var boxes = [];
  if (isBrrrr) {
    boxes = [
      ['Total Invested', f$(d.totalIn), 'hi'],
      ['Refi Loan', f$(d.loan), ''],
      ['Cash-Out', f$(d.bData ? d.bData.cashOut : 0), ''],
      ['Cash Left In', d.bData && d.bData.cashLeftIn <= 0 ? '$0 ✅' : f$(d.bData ? d.bData.cashLeftIn : 0), 'hi'],
      ['Refi P&I', f$(d.fixedPmt,2)+'/mo', ''],
      ['Monthly Carry', f$(d.carryFixed,2)+'/mo', 'warn'],
      ['Cash Flow', f$(d.cashFlow,2)+'/mo', 'hi'],
      ['Cap Rate', fPct(d.capRate), ''],
      ['CoC Return', d.coc >= 9999 ? '∞ %' : fPct(d.coc), 'hi'],
      ['Equity Retained', f$(d.equity), 'hi'],
    ];
  } else {
    boxes = [
      [isCash ? 'Purchase Price' : 'Down Payment ('+f.downPct+'%)', f$(d.down), ''],
      ['Closing Costs', f$(d.cTotal), ''],
      ['Rehab Total', f$(d.rehab), ''],
      ['Total Cash Needed', f$(d.totalIn), 'hi'],
    ];
    if (!isCash) {
      boxes.push(['Loan Amount', f$(d.loan), '']);
      boxes.push(['Fixed P&I ('+f.mortgageTerm+'yr)', f$(d.fixedPmt,2)+'/mo', '']);
      boxes.push(['Interest-Only / mo', f$(d.ioPmt,2)+'/mo', '']);
      boxes.push(['Carry Cost (Fixed)', f$(d.carryFixed,2)+'/mo', 'warn']);
    } else {
      boxes.push(['Monthly Carry (no debt)', f$(d.carryCash,2)+'/mo', 'warn']);
    }
    boxes.push(['Monthly Cash Flow', f$(d.cashFlow,2)+'/mo', 'hi']);
    boxes.push(['Cash-on-Cash', fPct(d.coc), 'hi']);
    boxes.push(['Cap Rate', fPct(d.capRate), '']);
    boxes.push(['Equity After Rehab', f$(d.equity), 'hi']);
    boxes.push(['NOI / yr', f$(d.noi), '']);
  }
  return boxes.map(function(bx){
    return '<div class="calc-box '+bx[2]+'"><div class="cl">'+bx[0]+'</div><div class="cv">'+bx[1]+'</div></div>';
  }).join('');
}

function saveProperty() {
  collectForm();
  var p = currentForm;
  if (!p.address || !p.address.trim()) { toast('Please enter an address.'); return; }
  if (editingId) {
    for (var i=0;i<properties.length;i++) {
      if (properties[i].id === editingId) { properties[i] = Object.assign({},p,{id:editingId}); break; }
    }
  } else {
    properties.push(Object.assign({},p,{id:Date.now()}));
  }
  saveData();
  renderAll();
  closeModal('modal-edit');
  toast(editingId ? 'Property updated ✓' : 'Property added ✓');
}

    +(!d.isCash?sec('Mortgage',[tr((d.isBrrrr?'Refi':'Fixed')+' Rate ('+p.mortgageRate+'%/'+p.mortgageTerm+'yr)',f$(d.fixedPmt,2)+'/mo'),(!d.isBrrrr?tr('Interest Only ('+p.interestOnlyRate+'%)',f$(d.ioPmt,2)+'/mo'):''),tr('Loan Amount',f$(d.loan))].join('')):'')
    +sec('Monthly Operating',[tr('Property Taxes',f$(nv(p.taxes)/12,2)+'/mo'),tr('Insurance',f$(nv(p.insurance)/12,2)+'/mo'),tr('HOA',f$(p.hoaFees||0,2)+'/mo'),tr('Other',f$(p.otherMonthly||0,2)+'/mo'),tr('Total Carry',f$(d.carryFixed,2)+'/mo')].join(''))
    +(d.isBrrrr?sec('BRRRR',[tr('Cash-Out from Refi',f$(d.bData.cashOut)),tr('Cash Left In Deal',d.bData.cashLeftIn<=0?'$0 ✅':f$(d.bData.cashLeftIn)),tr('Hold Period',nv(p.brrrrHoldMonths)+' months'),tr('Hold Cost',f$(d.bData.holdCost))].join('')):'')
    +'</div>'
    +'<div>'+sec('Returns',returnsRows)+sec('Itemized Closing Costs',closingRows)+'</div>'
    +'</div>'
    +(p.notes?'<div style="background:#fefce8;border:1px solid #fde68a;border-radius:6px;padding:12px;margin-top:8px;"><div style="font-size:11px;font-weight:700;color:#92400e;margin-bottom:4px;">NOTES</div><div style="font-size:12px;">'+p.notes+'</div></div>':'')
    +'</div>'
    +'<div style="background:#f9fafb;border-top:1px solid #e5e7eb;padding:10px 28px;font-size:10px;color:#9ca3af;display:flex;justify-content:space-between;">'
    +'<span>NY English Group · richard@nyenglishgroup.com</span><span>NYEG-ACQ-'+p.id+' · Confidential</span>'
    +'</div></div>'
    +'<div class="noprint" style="max-width:860px;margin:14px auto;display:flex;gap:10px;">'
    +'<button onclick="window.print()" style="flex:1;background:#1e1b4b;color:white;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">🖨️ Print / Save as PDF</button>'
    +'<button onclick="window.close()" style="background:#e5e7eb;border:none;padding:12px 20px;border-radius:8px;font-size:14px;cursor:pointer;">Close</button>'
    +'</div></body></html>';
  var w = window.open('','_blank');
  w.document.write(html);
  w.document.close();
}

// ── Email ─────────────────────────────────────────────────────────────────────
function openEmail(id) {
  emailPropId = id;
  closeModal('modal-detail');
  var p = properties.filter(function(x){ return x.id===id; })[0];
  if (!p) return;
  var d = derive(p);
  emailSubject = 'NYEG Acquisition Analysis — ' + p.address + (p.city?', '+p.city:'');
  emailBody = 'Hi Richard,\n\nAcquisition analysis for:\n'+p.address+(p.city?', '+p.city:'')+(p.state?', '+p.state:'')+'\nStage: '+p.stage+' | Type: '+(d.isBrrrr?'BRRRR':d.isCash?'Cash':'Mortgage')+' | Lead: '+(p.leadSource||'—')
    +'\n\n── DEAL SUMMARY ──────────────────────'
    +'\nAsking Price:        '+f$(p.askingPrice)
    +'\nAmount Offered:      '+f$(p.amountOffered)
    +'\nPurchase Price:      '+f$(d.purchase)
    +'\nARV:                 '+f$(p.arv)
    +(d.isBrrrr?'\nRefi Loan:           '+f$(d.loan)+'\nCash-Out from Refi:  '+f$(d.bData.cashOut)+'\nCash Left In Deal:   '+(d.bData.cashLeftIn<=0?'$0 (full pull)':f$(d.bData.cashLeftIn)):'\n'+(d.isCash?'Total Cash:          '+f$(d.totalIn):'Down Payment ('+p.downPct+'%): '+f$(d.down)))
    +'\nClosing Costs:       '+f$(d.cTotal)
    +'\nRehab Total:         '+f$(d.rehab)
    +'\nTotal Cash Needed:   '+f$(d.totalIn)
    +'\nEquity:              '+f$(d.equity)
    +'\n\n── RETURNS ───────────────────────────'
    +'\nGross Rent:          '+f$(p.grossRent)+'/mo'
    +'\nCash Flow:           '+f$(d.cashFlow,2)+'/mo'
    +'\nCap Rate:            '+fPct(d.capRate)
    +'\nCash-on-Cash:        '+(d.isBrrrr&&d.coc>=9999?'∞ %':fPct(d.coc))
    +'\nNOI/yr:              '+f$(d.noi)
    +(!d.isCash?'\nP&I Payment:         '+f$(d.fixedPmt,2)+'/mo':'')
    +'\nMonthly Carry:       '+f$(d.carryFixed,2)+'/mo'
    +(p.notes?'\n\n── NOTES ─────────────────────────────\n'+p.notes:'')
    +'\n\n──────────────────────────────────────\nNY English Group · richard@nyenglishgroup.com\nGenerated: '+new Date().toLocaleDateString();

  document.getElementById('email-body').innerHTML = ''
    +'<div style="background:#f8fafc;border-radius:10px;padding:12px;margin-bottom:14px;">'
    +'<div style="font-size:13px;margin-bottom:4px;"><strong style="color:#64748b;">To:</strong> <span style="color:#4338ca;">richard@nyenglishgroup.com</span></div>'
    +'<div style="font-size:12px;"><strong style="color:#64748b;">Subject:</strong> '+esc(emailSubject)+'</div>'
    +'</div>'
    +'<div class="field"><label>Add a note (optional)</label><textarea id="email-note" style="height:60px;"></textarea></div>'
    +'<div class="email-preview">'+esc(emailBody)+'</div>'
    +'<div id="email-status"></div>';
  document.getElementById('modal-email').classList.add('open');
}

function copyEmailText() {
  var note = (document.getElementById('email-note')||{}).value || '';
  var full = emailBody + (note ? '\n\nAdditional Notes:\n'+note : '');
  navigator.clipboard.writeText(full).then(function(){
    var el = document.getElementById('email-status');
    el.className='email-status copied'; el.textContent='✅ Copied to clipboard.';
  }).catch(function(){ toast('Could not copy — please copy manually.'); });
}

function openMailClient() {
  var note = (document.getElementById('email-note')||{}).value || '';
  var full = emailBody + (note ? '\n\nAdditional Notes:\n'+note : '');
  window.open('mailto:richard@nyenglishgroup.com?subject='+encodeURIComponent(emailSubject)+'&body='+encodeURIComponent(full),'_blank');
  var el = document.getElementById('email-status');
  el.className='email-status ok'; el.textContent='✅ Mail client opened — check your mail app to send.';
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.overlay').forEach(function(el){
  el.addEventListener('click', function(e){ if(e.target===el) el.classList.remove('open'); });
});

loadData();
renderAll();
</script>
